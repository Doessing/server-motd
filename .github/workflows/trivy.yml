name: Trivy Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'   # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # ── Scan repo files for hardcoded secrets and shell misconfigurations ────────
  trivy-fs:
    name: "Trivy / Repo (secrets + misconfig)"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run Trivy — filesystem scan
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478  # 0.34.2
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret,misconfig
          severity: MEDIUM,HIGH,CRITICAL
          format: sarif
          output: trivy-fs.sarif
          exit-code: '1'

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98  # v4.32.6
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ── Scan apt packages installed by the installer for known CVEs ──────────────
  trivy-os:
    name: "Trivy / OS packages (CVEs)"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install the packages the installer would apt-get
        run: sudo apt-get install -y -qq toilet toilet-fonts dnsutils curl

      - name: Run Trivy — OS package CVE scan
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478  # 0.34.2
        with:
          scan-type: fs
          scan-ref: /
          scanners: vuln
          vuln-type: os
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-os.sarif
          exit-code: '0'   # informational — runner OS CVEs are not our bug

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98  # v4.32.6
        if: always()
        with:
          sarif_file: trivy-os.sarif
          category: trivy-os
