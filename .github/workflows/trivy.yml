name: Trivy Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'   # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

jobs:

  # ── Scan repo files for hardcoded secrets and shell misconfigurations ────────
  trivy-fs:
    name: "Trivy / Repo (secrets + misconfig)"
    runs-on: ubuntu-latest

    permissions:
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy — filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret,misconfig
          severity: MEDIUM,HIGH,CRITICAL
          format: sarif
          output: trivy-fs.sarif
          exit-code: '1'

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ── Scan apt packages installed by the installer for known CVEs ──────────────
  trivy-os:
    name: "Trivy / OS packages (CVEs)"
    runs-on: ubuntu-latest

    permissions:
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install the packages the installer would apt-get
        run: sudo apt-get install -y -qq toilet toilet-fonts dnsutils curl

      - name: Run Trivy — OS package CVE scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: /
          scanners: vuln
          vuln-type: os
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-os.sarif
          exit-code: '0'   # informational — runner OS CVEs are not our bug

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-os.sarif
          category: trivy-os
