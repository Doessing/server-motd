name: Trivy Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'   # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # ── Scan repo files for hardcoded secrets and shell misconfigurations ────────
  trivy-fs:
    name: "Trivy / Repo (secrets + misconfig)"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run Trivy — filesystem scan
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478  # 0.34.2
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret,misconfig
          severity: MEDIUM,HIGH,CRITICAL
          format: sarif
          output: trivy-fs.sarif
          exit-code: '1'
          limit-severities-for-sarif: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ── Scan only the packages install.sh uses, in a minimal Docker image ────────
  # Builds Dockerfile.scan (ubuntu:24.04 + toilet + dnsutils + curl) and scans
  # that image with Trivy. This scopes CVE results strictly to our dependencies
  # — no runner OS noise.
  trivy-deps:
    name: "Trivy / Dependency CVEs (Docker)"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build scan image
        run: docker build -f Dockerfile.scan -t motd-scan:ci .

      - name: Run Trivy — dependency CVE scan
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478  # 0.34.2
        with:
          scan-type: image
          image-ref: motd-scan:ci
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-deps.sarif
          exit-code: '0'  # informational — upstream package CVEs are not our bug

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        if: always()
        with:
          sarif_file: trivy-deps.sarif
          category: trivy-deps
