name: ShellCheck

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install ShellCheck
        run: sudo apt-get install -y -qq shellcheck

      - name: Run ShellCheck on all scripts
        run: |
          shellcheck -S warning install.sh motd-banner.sh profile-snippet.sh
