name: ShellCheck

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install ShellCheck
        run: sudo apt-get install -y -qq shellcheck

      - name: Run ShellCheck on all scripts
        run: |
          shellcheck -S warning install.sh motd-banner.sh profile-snippet.sh
