name: ShellCheck

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y -qq shellcheck

      - name: Run ShellCheck on all scripts
        run: |
          shellcheck -S warning install.sh motd-banner.sh profile-snippet.sh
